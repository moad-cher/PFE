<div id="notif-{{ notification.pk }}"
    class="bg-white rounded-lg shadow-sm border p-4 flex justify-between items-start {% if not notification.is_read %}border-l-4 border-l-blue-500{% endif %}">
    <div class="flex-1">
        {% if notification.link %}
        <a href="{{ notification.link }}" class="font-medium text-sm text-gray-800 hover:text-blue-600">  {{ notification.title }}</a>
        {% else %}
        <span class="font-medium text-sm text-gray-800">{{ notification.title }}</span>
        {% endif %}
        {% if notification.message %}
        <p class="text-xs text-gray-500 mt-1">{{ notification.message }}</p>
        {% endif %}
        <p class="text-xs text-gray-400 mt-1">{{ notification.created_at|timesince }} · {{ notification.get_type_display }}</p>
    </div>
    {% if not notification.is_read %}
    <button hx-post="{% url 'notifications:mark_read' notification.pk %}" hx-target="#notif-{{ notification.pk }}"
        hx-swap="outerHTML" class="text-xs text-blue-600 hover:underline ml-3 whitespace-nowrap">
        Marquer lu
    </button>
    {% endif %}
</div>
