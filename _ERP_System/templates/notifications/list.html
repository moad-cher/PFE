{% extends 'base.html' %}
{% block title %}Notifications — ERP{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Notifications</h1>
    {% if notifications %}
    <button hx-post="{% url 'notifications:mark_all_read' %}" hx-target="#notification-list" hx-swap="innerHTML"
        class="text-sm text-blue-600 hover:underline">
        Tout marquer comme lu
    </button>
    {% endif %}
</div>

<div id="notification-list" class="space-y-2">
    {% include 'notifications/partials/notification_list.html' %}
</div>
{% endblock %}
