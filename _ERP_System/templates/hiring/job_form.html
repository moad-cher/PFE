{% extends 'base.html' %}
{% block title %}{{ title }} — ERP{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow p-8">
        <h1 class="text-2xl font-bold mb-6">{{ title }}</h1>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                <p class="text-red-500 text-xs mt-1">{{ error }}</p>
                {% endfor %}
            </div>
            {% endfor %}
            <div class="flex space-x-3 mt-6">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-medium">
                    Enregistrer
                </button>
                <a href="{% url 'hiring:job_list' %}"
                    class="bg-gray-100 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-200">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
