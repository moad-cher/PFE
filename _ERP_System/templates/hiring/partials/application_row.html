<tr class="border-b hover:bg-gray-50" id="app-row-{{ app.pk }}">
  <td class="px-4 py-3">
    <a
      href="{% url 'hiring:application_detail' app.pk %}"
      class="text-blue-600 hover:underline font-medium"
      >{{ app.candidate_name }}</a
    >
    <p class="text-xs text-gray-400">{{ app.candidate_email }}</p>
  </td>
  <td class="px-4 py-3">
    {% include 'hiring/partials/ai_score.html' with application=app %}
  </td>
  <td class="px-4 py-3">
    <select
      hx-post="{% url 'hiring:application_update_status' app.pk %}"
      hx-target="#app-row-{{ app.pk }}"
      hx-swap="outerHTML"
      name="status"
      class="text-xs border rounded px-2 py-1"
    >
      {% for value, label in app.Status.choices %}
      <option
        value="{{ value }}"
        {%
        if
        app.status=""
        ="value"
        %}selected{%
        endif
        %}
      >
        {{ label }}
      </option>
      {% endfor %}
    </select>
  </td>
  <td class="px-4 py-3 text-gray-500">{{ app.created_at|date:"d/m/Y" }}</td>
  <td class="px-4 py-3">
    <a
      href="{% url 'hiring:schedule_interview' app.pk %}"
      class="text-sm text-blue-600 hover:underline"
      >Entretien</a
    >
  </td>
</tr>
