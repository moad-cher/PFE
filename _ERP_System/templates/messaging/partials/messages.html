{% for msg in messages %}
<div class="flex {% if msg.author == current_user %}justify-end{% else %}justify-start{% endif %} mb-2">
    <div class="max-w-xs lg:max-w-sm xl:max-w-md">
        {% if msg.author != current_user %}
        <p class="text-xs text-gray-400 mb-0.5 ml-2">{{ msg.author.get_full_name|default:msg.author.username }}</p>
        {% endif %}
        <div class="px-3 py-2 rounded-2xl text-sm break-words {% if msg.author == current_user %}bg-blue-600 text-white rounded-br-none{% else %}bg-gray-100 text-gray-800 rounded-bl-none{% endif %}">
            {{ msg.content }}
        </div>
        <p class="text-xs text-gray-300 mt-0.5 {% if msg.author == current_user %}text-right mr-1{% else %}ml-1{% endif %}">
            {{ msg.created_at|date:"d/m H:i" }}
        </p>
    </div>
</div>
{% empty %}
<div class="flex flex-col items-center justify-center py-16 text-gray-400">
    <svg class="w-10 h-10 mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
    </svg>
    <p class="text-sm">Aucun message. Commencez la conversation !</p>
</div>
{% endfor %}
