{% extends 'base.html' %}
{% block title %}Supprimer — {{ task.title }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="bg-white rounded-2xl shadow p-8 text-center">
        <div class="text-4xl mb-4">⚠️</div>
        <h1 class="text-xl font-bold mb-2">Supprimer cette tâche ?</h1>
        <p class="text-gray-500 text-sm mb-6">
            La tâche « <strong>{{ task.title }}</strong> » sera définitivement supprimée
            avec tous ses commentaires.
        </p>
        <form method="post" class="flex justify-center space-x-3">
            {% csrf_token %}
            <a href="{% url 'projects:task_detail' task.pk %}"
                class="bg-gray-100 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-200 text-sm">Annuler</a>
            <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 text-sm">
                Supprimer
            </button>
        </form>
    </div>
</div>
{% endblock %}
