<div class="bg-white rounded-2xl shadow p-5 text-sm" id="assignee-section">
    <div class="flex justify-between items-center mb-3">
        <span class="text-gray-500 font-medium">Réassigner la tâche</span>
        <button hx-get="{% url 'projects:task_reassign' task.pk %}" hx-target="#assignee-section" hx-swap="outerHTML"
            class="text-xs text-gray-400 hover:text-gray-600">Annuler</button>
    </div>
    <form hx-post="{% url 'projects:task_reassign' task.pk %}" hx-target="#assignee-section" hx-swap="outerHTML">
        {% csrf_token %}
        <div class="space-y-2 max-h-48 overflow-y-auto mb-3">
            {% for member in members %}
            <label class="flex items-center space-x-2 p-2 rounded hover:bg-gray-50 cursor-pointer">
                <input type="checkbox" name="assigned_to" value="{{ member.pk }}" {% if member.pk in current_ids
                    %}checked{% endif %} class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                <div
                    class="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xs font-bold">
                    {{ member.username|first|upper }}
                </div>
                <div>
                    <span class="text-sm">{{ member.get_full_name|default:member.username }}</span>
                    {% if member.skills %}
                    <span class="text-xs text-gray-400 ml-1">· {{ member.skills|truncatewords:3 }}</span>
                    {% endif %}
                </div>
            </label>
            {% empty %}
            <p class="text-gray-400 text-xs">Aucun membre dans le projet.</p>
            {% endfor %}
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs hover:bg-blue-700">
            Sauvegarder
        </button>
    </form>
</div>
